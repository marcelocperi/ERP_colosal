{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow mb-4">
            <div class="card-header py-3 bg-dark text-white">
                <h6 class="m-0 font-weight-bold">Nuevo Proveedor</h6>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="codigo" class="form-label">Código Interno</label>
                            <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Ej: PRO-001">
                        </div>
                        <div class="col-md-8 mb-3">
                            <label for="nombre" class="form-label">Razón Social</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="cuit" class="form-label">CUIT</label>
                            <input type="text" class="form-control" id="cuit" name="cuit" placeholder="Sin guiones"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label for="tipo_responsable" class="form-label">Condición Fiscal</label>
                            <select class="form-select" id="tipo_responsable" name="tipo_responsable">
                                <option value="Responsable Inscripto">Responsable Inscripto</option>
                                <option value="Monotributo">Monotributo</option>
                                <option value="Exento">Exento</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico (Contacto)</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>

                    <div class="mb-3">
                        <label for="observaciones" class="form-label">Observaciones / Notas Internas</label>
                        <textarea class="form-control" id="observaciones" name="observaciones" rows="3"
                            placeholder="Ej: Datos de entrega, bancos con los que opera, etc."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('compras.proveedores') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-dark">Registrar Proveedor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const cuitInput = document.getElementById('cuit');
        if (cuitInput) {
            cuitInput.addEventListener('input', function () {
                if (!this.value) {
                    this.classList.remove('is-invalid', 'is-valid');
                    return;
                }
                if (validarCUIT(this.value)) {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                    this.setCustomValidity('');
                } else {
                    this.classList.remove('is-valid');
                    this.classList.add('is-invalid');
                    this.setCustomValidity('CUIT Inválido');
                }
            });
        }
    });
</script>
{% endblock %}
