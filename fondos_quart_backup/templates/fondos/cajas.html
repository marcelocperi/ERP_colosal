{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-4 text-gray-800">Cajas y Bancos</h1>

<div class="row">
    {% for c in cajas %}
    <div class="col-md-4 mb-4">
        <div class="card shadow h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="card-title">{{ c.nombre }}</h5>
                    <span class="badge badge-info">{{ c.moneda }}</span>
                </div>
                <h2 class="mt-3">$ {{ c.saldo_actual }}</h2>
                <p class="text-muted mb-0">{{ c.tipo }}</p>
            </div>
            <div class="card-footer bg-transparent">
                <a href="#" class="btn btn-sm btn-outline-primary w-100">Ver Movimientos</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center">No hay cuentas de fondos definidas.</div>
    {% endfor %}
</div>
{% endblock %}
