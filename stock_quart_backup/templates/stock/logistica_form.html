{% extends "base.html" %}

{% block content %}
<div class="header-container mb-4">
    <h1 class="page-title">
        <i class="fas fa-truck-pickup me-2 text-primary"></i>
        {{ 'Editar' if logistica else 'Nueva' }} Empresa Logística
    </h1>
    <p class="text-muted">Si esta logística se usa en una transferencia, el COT se generará hasta su dirección.</p>
</div>

<div class="card bg-dark border-secondary shadow-lg">
    <div class="card-body p-4">
        <form
            action="{{ url_for('stock.logistica_nueva' if not logistica else 'stock.logistica_editar', id=logistica.id if logistica else None) }}"
            method="POST">
            <div class="row">
                <div class="col-md-8 mb-4">
                    <label class="form-label-premium"><i class="fas fa-signature me-1"></i> RAZÓN SOCIAL /
                        NOMBRE</label>
                    <input type="text" name="nombre" value="{{ logistica.nombre if logistica else '' }}" required
                        class="input-premium">
                </div>
                <div class="col-md-4 mb-4">
                    <label class="form-label-premium"><i class="fas fa-id-card me-1"></i> CUIT</label>
                    <input type="text" name="cuit" value="{{ logistica.cuit if logistica else '' }}"
                        placeholder="20-XXXXXXXX-X" class="input-premium">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label-premium"><i class="fas fa-envelope me-1"></i> EMAIL</label>
                    <input type="email" name="email" value="{{ logistica.email if logistica else '' }}"
                        class="input-premium">
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label-premium"><i class="fas fa-phone me-1"></i> TELÉFONO</label>
                    <input type="text" name="telefono" value="{{ logistica.telefono if logistica else '' }}"
                        class="input-premium">
                </div>
            </div>

            <div class="row mt-2">
                <div class="col-12">
                    <hr class="border-secondary opacity-25">
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label-premium">CALLE</label>
                    <input type="text" name="calle" value="{{ logistica.calle if logistica else '' }}"
                        class="input-premium">
                </div>
                <div class="col-md-2 mb-4">
                    <label class="form-label-premium">NÚMERO</label>
                    <input type="text" name="numero" value="{{ logistica.numero if logistica else '' }}"
                        class="input-premium">
                </div>
                <div class="col-md-4 mb-4">
                    <label class="form-label-premium">LOCALIDAD</label>
                    <input type="text" name="localidad" value="{{ logistica.localidad if logistica else '' }}"
                        class="input-premium">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label-premium">PROVINCIA</label>
                    <select name="provincia"
                        class="form-select bg-dark text-white border-secondary h-100 py-3 rounded-pill px-4">
                        {% for p in provincias %}
                        <option value="{{ p.nombre }}" {{ 'selected' if logistica and logistica.provincia==p.nombre
                            else '' }}>{{ p.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-4 d-flex align-items-end pb-3">
                    <div class="form-check custom-check">
                        <input type="checkbox" name="activo" id="activo" value="1" {{ 'checked' if not logistica or
                            logistica.activo else '' }} class="form-check-input">
                        <label for="activo" class="form-check-label text-white">Estado Activo</label>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top border-secondary d-flex justify-content-between">
                <a href="{{ url_for('stock.logisticas_lista') }}"
                    class="btn btn-secondary px-5 rounded-pill">Cancelar</a>
                <button type="submit" class="btn btn-primary px-5 rounded-pill fw-bold">
                    <i class="fas fa-save me-2"></i>Guardar Empresa Logística
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
