{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0 fw-bold">
        <i class="fas fa-cash-register text-primary me-2"></i>Módulo de Ventas
    </h1>
</div>

<!-- ── 4 CARDS DE ACCESO RÁPIDO ───────────────────────────────── -->
<div class="row g-4 mb-5">

    <!-- Nueva Factura -->
    <div class="col-xl-3 col-md-6">
        <a href="{{ url_for('ventas.facturar') }}" class="text-decoration-none">
            <div class="card border-0 shadow h-100 card-accion"
                style="background: linear-gradient(135deg,#1d4ed8,#1e40af);">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="rounded-circle bg-white bg-opacity-10 d-flex align-items-center justify-content-center"
                        style="width:56px;height:56px;min-width:56px;">
                        <i class="fas fa-plus text-white fa-2x"></i>
                    </div>
                    <div>
                        <div class="text-white-50 small text-uppercase fw-semibold">Facturación</div>
                        <div class="text-white fw-bold fs-5">Nueva Factura</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Clientes -->
    <div class="col-xl-3 col-md-6">
        <a href="{{ url_for('ventas.clientes') }}" class="text-decoration-none">
            <div class="card border-0 shadow h-100 card-accion"
                style="background: linear-gradient(135deg,#0e7490,#164e63);">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="rounded-circle bg-white bg-opacity-10 d-flex align-items-center justify-content-center"
                        style="width:56px;height:56px;min-width:56px;">
                        <i class="fas fa-users text-white fa-2x"></i>
                    </div>
                    <div>
                        <div class="text-white-50 small text-uppercase fw-semibold">Cartera</div>
                        <div class="text-white fw-bold fs-5">Clientes</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Comprobantes -->
    <div class="col-xl-3 col-md-6">
        <a href="{{ url_for('ventas.comprobantes') }}" class="text-decoration-none">
            <div class="card border-0 shadow h-100 card-accion"
                style="background: linear-gradient(135deg,#7c3aed,#4c1d95);">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="rounded-circle bg-white bg-opacity-10 d-flex align-items-center justify-content-center"
                        style="width:56px;height:56px;min-width:56px;">
                        <i class="fas fa-file-invoice text-white fa-2x"></i>
                    </div>
                    <div>
                        <div class="text-white-50 small text-uppercase fw-semibold">Historial</div>
                        <div class="text-white fw-bold fs-5">Comprobantes</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Cuenta Corriente -->
    <div class="col-xl-3 col-md-6">
        <a href="{{ url_for('ventas.cuenta_corriente_global') }}" class="text-decoration-none">
            <div class="card border-0 shadow h-100 card-accion"
                style="background: linear-gradient(135deg,#047857,#064e3b);">
                <div class="card-body d-flex align-items-center gap-4 p-4">
                    <div class="rounded-circle bg-white bg-opacity-10 d-flex align-items-center justify-content-center"
                        style="width:56px;height:56px;min-width:56px;">
                        <i class="fas fa-file-invoice-dollar text-white fa-2x"></i>
                    </div>
                    <div>
                        <div class="text-white-50 small text-uppercase fw-semibold">Saldos</div>
                        <div class="text-white fw-bold fs-5">Cuenta Corriente</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

</div>

<style>
    .card-accion {
        transition: transform .18s ease, box-shadow .18s ease;
    }

    .card-accion:hover {
        transform: translateY(-5px);
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.45) !important;
    }
</style>
{% endblock %}
